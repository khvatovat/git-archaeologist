name: App CI/CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "worker/**"
      - "*.py"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - "worker/**"
      - "*.py"
      - "pyproject.toml"

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            "fastapi>=0.110" uvicorn boto3 pydantic \
            anthropic httpx rich python-dotenv \
            "moto[dynamodb,sqs,secretsmanager]" \
            pytest pytest-asyncio coverage

      - name: Run tests
        run: |
          coverage run -m pytest api/tests/ worker/tests/ -v
          coverage xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Generate coverage
        run: |
          pip install \
            "fastapi>=0.110" uvicorn boto3 pydantic \
            anthropic httpx rich python-dotenv \
            "moto[dynamodb,sqs,secretsmanager]" \
            pytest pytest-asyncio coverage
          coverage run -m pytest api/tests/ worker/tests/ -v
          coverage xml

      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  build-and-push:
    name: Build, Scan & Deploy
    runs-on: ubuntu-latest
    needs: [test, sca-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          SHA="${{ github.sha }}"
          echo "api=${REGISTRY}/git-archaeologist-dev-api:${SHA}" >> "$GITHUB_OUTPUT"
          echo "worker=${REGISTRY}/git-archaeologist-dev-worker:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build API
        run: docker build -f api/Dockerfile -t ${{ steps.tags.outputs.api }} .

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.tags.outputs.api }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: "1"

      - name: Build worker
        run: docker build -f worker/Dockerfile -t ${{ steps.tags.outputs.worker }} .

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.tags.outputs.worker }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: "1"

      - name: Push images
        run: |
          docker push ${{ steps.tags.outputs.api }}
          docker push ${{ steps.tags.outputs.worker }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster git-archaeologist-dev-cluster \
            --service git-archaeologist-dev-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs update-service \
            --cluster git-archaeologist-dev-cluster \
            --service git-archaeologist-dev-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
