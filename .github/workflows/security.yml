name: Security Scan (Pipeline C)

# Deliberately different toolchain from app.yml (Pipeline A):
# - SAST: Semgrep (vs SonarCloud in A)
# - Dependency audit: pip-audit (vs Trivy filesystem in A)
# - Secret detection: truffleHog (vs none in A)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday scan

jobs:
  semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/secrets
            p/owasp-top-ten
          output: semgrep.sarif
          output-format: sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  pip-audit:
    name: Dependency Audit — pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit API dependencies
        run: pip-audit -r api/requirements.txt --format json -o pip-audit-api.json
        continue-on-error: true

      - name: Audit worker dependencies
        run: pip-audit -r worker/requirements.txt --format json -o pip-audit-worker.json
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-*.json

  secret-scan:
    name: Secret Detection — TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
